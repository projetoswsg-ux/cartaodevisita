* {

body {

/* Cores ajustadas para tema claro */
:root {
    --branco: #ffffff;
    --cinza-claro: #f5f5f5;
    --cinza-medio: #eaeaea;
    --cinza-escuro: #333333;

.card-container {
    max-width: 540px;
    width: 100%;
    animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Cartão principal */
.digital-card {
    background: var(--branco);
    border-radius: 42px;
    overflow: hidden;
    box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.2);
    transition: transform 0.25s ease;
}

.digital-card:hover {
    transform: scale(1.01);
}

/* Banner */
.banner-branco {
    background: var(--branco);
    padding: 32px 26px 27px;
    text-align: center;

}

.logo-img-wrapper {

    font-size: 0.75rem;
    font-weight: 600;
    color: var(--dourado);

/* Área info */
.info-area {

    text-align: center;
}

.foto-wrapper {

}

.foto-representante {
    width: 110px;

    object-fit: cover;
    border: 4px solid var(--dourado);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    background: var(--branco);

.nome {

.cargo {

.contato-item:hover {

    <script>
        // Função para mostrar toast
        function showToast(message) {
            const existingToast = document.querySelector('.toast-message');
            if(existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                if(toast) toast.remove();
            }, 2000);
        }

        // Função para obter os dados do perfil (para compartilhar)
        function getProfileData() {
            return `*G&J Representações* 📝

👤 *Gerson Bezerra*

📲 Clique no link para falar conosco:
` ;
        }

        // Botão COMPARTILHAR
        const shareBtn = document.getElementById('shareBtn');
        
        shareBtn.addEventListener('click', async () => {
            // URL atual para compartilhar
            const currentUrl = window.location.href;
            
            const shareData = {
                title: 'G&J Representações - Cartão de Visita',
                text: getProfileData(),
                url: currentUrl
            };
            
            // Verifica se o navegador suporta a Web Share API
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                    showToast('Compartilhado com sucesso!');
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        fallbackShare();
                    }
                }
            } else {
                // Fallback para navegadores que não suportam share
                fallbackShare();
            }
        });
        
        function fallbackShare() {
            const textToCopy = getProfileData() + '\n\n🔗 Link: ' + window.location.href;
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast('Perfil copiado! Cole e compartilhe onde quiser.');
            }).catch(() => {
                alert("Copie manualmente: " + getProfileData());
            });
        }

        // Ajusta a meta tag OG URL dinamicamente
        const metaOgUrl = document.querySelector('meta[property="og:url"]');
        if (metaOgUrl) {
            metaOgUrl.setAttribute('content', window.location.href);
        }
    </script>
